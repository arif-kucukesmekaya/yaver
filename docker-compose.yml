version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sellerai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sellerai_user
      POSTGRES_PASSWORD: sellerai_pass
      POSTGRES_DB: sellerai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sellerai_user -d sellerai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
